# -------------------------------------------------------
# Paramètres HikariCP (pool de connexions)
# -------------------------------------------------------

# Taille maximale du pool
hikari.maximumPoolSize=10

# Nombre minimum de connexions inactives maintenues
hikari.minimumIdle=2

# Délai d'attente pour obtenir une connexion (ms) – 30 secondes
hikari.connectionTimeout=30000

# Durée de vie maximale d'une connexion dans le pool (ms) – 10 minutes
hikari.maxLifetime=600000

# Intervalle de test de maintien en vie (ms) – 5 minutes
hikari.keepaliveTime=300000